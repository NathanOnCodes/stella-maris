<!-- Navbar principal Regina Caelli -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary-rc py-3 shadow">
    <div class="container">
        <!-- Logo / Nome do Site -->
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'blog:postagem-lista' %}">
            <i class="bi bi-journal-bookmark-fill me-2 text-accent"></i>
            <span class="fs-4">Regina Caelli</span>
        </a>

        <!-- Toggle Button para Mobile -->
        <button class="navbar-toggler border-light" type="button" data-bs-toggle="collapse" 
                data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu Principal -->
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-center">
                
                {% if user.is_authenticated %}
                    <!-- Usuário autenticado -->
                    <li class="nav-item me-3">
                        <span class="nav-link text-light">
                            <i class="bi bi-person-circle me-1"></i>
                            <strong>{{ user.username }}</strong>
                        </span>
                    </li>
                    
                    <!-- Nova Postagem (apenas com permissão) -->
                    {% if perms.blog.add_post %}
                    <li class="nav-item me-3">
                        <a class="nav-link btn btn-outline-light btn-sm px-3 py-1" 
                           href="{% url 'blog:postagem-nova' %}">
                            <i class="bi bi-plus-circle me-1"></i>
                            Nova Postagem
                        </a>
                    </li>
                    {% endif %}
                    
                    <!-- Logout -->
                    <li class="nav-item">
                        <a class="nav-link btn btn-accent btn-sm px-3 py-1" 
                           href="{% url 'administrativo:logout' %}">
                            <i class="bi bi-box-arrow-right me-1"></i>
                            Sair
                        </a>
                    </li>
                    
                {% else %}
                    <!-- Usuário não autenticado -->
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-light btn-sm px-3 py-1" 
                           href="{% url 'administrativo:login' %}">
                            <i class="bi bi-box-arrow-in-right me-1"></i>
                            Entrar
                        </a>
                    </li>
                {% endif %}
                
            </ul>
        </div>
    </div>
</nav>
